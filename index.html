<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#fce4ec">
    <title>恋爱模拟器 Pro</title>
    <style>
        :root {
            --pink-light: #fce4ec;
            --pink-mid: #f8bbd0;
            --pink-dark: #c2185b;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.35);
            --text-dark: #5a2d3a;
            --shadow-soft: 0 8px 32px rgba(194, 24, 91, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available;
            color: var(--text-dark);
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        .app-shell {
            position: relative;
            width: 100%;
            max-width: 430px;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(255, 182, 193, 0.4),
                inset 0 0 0 1px rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        .glass-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            background: rgba(255, 255, 255, 0.1);
            pointer-events: none;
        }

        @supports not (backdrop-filter: blur(1px)) {
            .glass-layer {
                background: rgba(255, 255, 255, 0.5);
            }
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.35s ease, transform 0.35s ease;
            pointer-events: none;
            z-index: 1;
        }

        .page.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .safe-top {
            padding-top: env(safe-area-inset-top, 20px);
        }

        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* 解锁页 */
        .unlock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 40px;
            gap: 30px;
        }

        .unlock-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink-mid), var(--pink-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: var(--shadow-soft);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .unlock-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--pink-dark), #880e4f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .pin-dot {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            transition: 0.3s;
        }

        .pin-dot.filled {
            background: rgba(194, 24, 91, 0.2);
            border-color: var(--pink-dark);
        }

        .pin-dot.active {
            border-color: var(--pink-dark);
            box-shadow: 0 0 20px rgba(194, 24, 91, 0.3);
        }

        .num-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 280px;
        }

        .num-key {
            aspect-ratio: 1;
            border-radius: 20px;
            border: none;
            background: var(--glass-bg);
            font-size: 24px;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .num-key:active {
            transform: scale(0.9);
            background: rgba(194, 24, 91, 0.3);
        }

        .num-key.special {
            background: transparent;
            font-size: 16px;
            color: #999;
        }

        /* 主页 */
        .home-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            background: var(--glass-bg);
            color: var(--text-dark);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .header-btn:active {
            transform: scale(0.95);
            background: rgba(194, 24, 91, 0.2);
        }

        .story-view {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .story-view::-webkit-scrollbar { display: none; }

        .story-bubble {
            background: var(--glass-bg);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            animation: fadeInUp 0.4s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            line-height: 1.7;
            font-size: 15px;
            white-space: pre-wrap;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--pink-dark);
            animation: dotBounce 1.4s infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .options-bar {
            display: flex;
            gap: 10px;
            padding: 12px 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .options-bar::-webkit-scrollbar { display: none; }

        .option-chip {
            flex-shrink: 0;
            padding: 10px 18px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: var(--glass-bg);
            color: var(--text-dark);
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .option-chip:active {
            background: rgba(194, 24, 91, 0.3);
            transform: scale(0.95);
        }

        .input-bar {
            display: flex;
            gap: 10px;
            padding: 12px 20px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .custom-input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: var(--glass-bg);
            color: var(--text-dark);
            font-size: 15px;
            outline: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            -webkit-user-select: text;
            user-select: text;
        }

        .custom-input::placeholder {
            color: rgba(90, 45, 58, 0.4);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--pink-mid), var(--pink-dark));
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.9);
        }

        /* 菜单 */
        .menu-overlay {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .menu-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 20px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(100px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-icon-item:active {
            background: rgba(194, 24, 91, 0.2);
            transform: scale(0.9);
        }

        .menu-icon {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--pink-mid), var(--pink-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .menu-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-dark);
        }

        /* 社交模拟 */
        .app-sim-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .back-arrow {
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            transition: 0.2s;
        }

        .back-arrow:active { transform: scale(0.8); }

        .app-sim-title {
            font-size: 18px;
            font-weight: 700;
            flex: 1;
            text-align: center;
        }

        .app-sim-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeInUp 0.3s ease;
        }

        .chat-msg.received {
            background: var(--glass-bg);
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }

        .chat-msg.sent {
            background: linear-gradient(135deg, var(--pink-mid), var(--pink-dark));
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .chat-input-bar {
            display: flex;
            gap: 10px;
            padding: 15px 20px 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 编辑页 */
        .edit-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .edit-section {
            background: var(--glass-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .edit-section h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: var(--pink-dark);
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #7a4b5a;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-dark);
            font-size: 14px;
            outline: none;
            -webkit-user-select: text;
            user-select: text;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .save-btn {
            width: 100%;
            padding: 16px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, var(--pink-mid), var(--pink-dark));
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: var(--shadow-soft);
            margin-top: 10px;
        }

        .save-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        .target-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .target-tab {
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--glass-bg);
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            border: 1px solid var(--glass-border);
        }

        .target-tab.active {
            background: var(--pink-dark);
            color: white;
            border-color: var(--pink-dark);
        }

        .add-target-btn {
            padding: 6px 14px;
            border-radius: 20px;
            background: transparent;
            border: 1px dashed var(--pink-dark);
            color: var(--pink-dark);
            font-size: 13px;
            cursor: pointer;
        }

        .remove-target-btn {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 14px;
            cursor: pointer;
            margin-left: auto;
            display: block;
        }

        .ai-optimize-btn {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 5px;
        }

        .toast {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 200;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
            pointer-events: none;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .api-status {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 11px;
            color: rgba(90, 45, 58, 0.4);
            z-index: 2;
            pointer-events: none;
        }

        @media (max-width: 430px) {
            .app-shell {
                max-width: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
<div class="app-shell" id="appShell">
    <div class="glass-layer"></div>

    <!-- 解锁页 -->
    <div class="page active" id="unlockPage">
        <div class="unlock-container safe-top safe-bottom">
            <div class="unlock-avatar">💝</div>
            <div class="unlock-title">恋爱模拟器 Pro</div>
            <div style="display:flex; gap:12px;" id="pinContainer">
                <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
                <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
            </div>
            <div class="num-pad">
                <button class="num-key" onclick="inputPin('1')">1</button>
                <button class="num-key" onclick="inputPin('2')">2</button>
                <button class="num-key" onclick="inputPin('3')">3</button>
                <button class="num-key" onclick="inputPin('4')">4</button>
                <button class="num-key" onclick="inputPin('5')">5</button>
                <button class="num-key" onclick="inputPin('6')">6</button>
                <button class="num-key" onclick="inputPin('7')">7</button>
                <button class="num-key" onclick="inputPin('8')">8</button>
                <button class="num-key" onclick="inputPin('9')">9</button>
                <button class="num-key special" onclick="inputPin('clear')">清除</button>
                <button class="num-key" onclick="inputPin('0')">0</button>
                <button class="num-key special" onclick="inputPin('back')">删除</button>
            </div>
        </div>
    </div>

    <!-- 主页 -->
    <div class="page" id="homePage">
        <div class="home-header safe-top">
            <button class="header-btn" onclick="switchPage('editPage')">📝 人设</button>
            <span style="font-weight:600; font-size:16px;">💕 恋爱日常</span>
            <button class="header-btn" onclick="switchPage('menuPage')">☰ 菜单</button>
        </div>
        <div class="story-view" id="storyView">
            <div class="story-bubble">欢迎回来 💕<br><br>AI 将根据你设定的所有角色和背景，自然地展开多线剧情。无需手动切换对象，他们会自己走进你的故事。</div>
        </div>
        <div class="options-bar" id="optionsBar">
            <button class="option-chip" onclick="chooseOption('温柔地回应')">🌸 温柔回应</button>
            <button class="option-chip" onclick="chooseOption('带着试探')">🌙 带着试探</button>
            <button class="option-chip" onclick="chooseOption('保持沉默')">🌱 保持沉默</button>
        </div>
        <div class="input-bar safe-bottom">
            <input type="text" class="custom-input" id="customInput" placeholder="输入你的行为或台词...">
            <button class="send-btn" onclick="sendCustom()">➤</button>
        </div>
        <div class="api-status" id="apiStatus">⚡ 就绪</div>
    </div>

    <!-- 菜单页 -->
    <div class="page menu-overlay" id="menuPage" onclick="if(event.target===this)switchPage('homePage')">
        <div class="menu-content safe-bottom">
            <div class="menu-grid">
                <div class="menu-icon-item" onclick="openApp('微信')"><div class="menu-icon">💬</div><span class="menu-label">微信</span></div>
                <div class="menu-icon-item" onclick="openApp('微博')"><div class="menu-icon">📱</div><span class="menu-label">微博</span></div>
                <div class="menu-icon-item" onclick="openApp('抖音')"><div class="menu-icon">🎵</div><span class="menu-label">抖音</span></div>
                <div class="menu-icon-item" onclick="openApp('小红书')"><div class="menu-icon">📕</div><span class="menu-label">小红书</span></div>
                <div class="menu-icon-item" onclick="openApp('豆瓣')"><div class="menu-icon">📚</div><span class="menu-label">豆瓣</span></div>
                <div class="menu-icon-item" onclick="openApp('短信')"><div class="menu-icon">✉️</div><span class="menu-label">短信</span></div>
                <div class="menu-icon-item" onclick="openApp('电话')"><div class="menu-icon">📞</div><span class="menu-label">电话</span></div>
                <div class="menu-icon-item" onclick="openApp('X')"><div class="menu-icon">🐦</div><span class="menu-label">X</span></div>
                <div class="menu-icon-item" onclick="logout()"><div class="menu-icon">🚪</div><span class="menu-label">退出</span></div>
            </div>
        </div>
    </div>

    <!-- 社交模拟页 -->
    <div class="page" id="socialPage">
        <div class="app-sim-header safe-top">
            <span class="back-arrow" onclick="switchPage('homePage')">←</span>
            <span class="app-sim-title" id="socialTitle">微信</span>
            <span style="width:24px;"></span>
        </div>
        <div class="app-sim-body" id="socialBody">
            <div class="chat-msg received">✨ 当前对话可能涉及多位角色</div>
        </div>
        <div class="chat-input-bar safe-bottom">
            <input type="text" class="custom-input" id="socialInput" placeholder="输入消息...">
            <button class="send-btn" onclick="sendSocialMsg()">➤</button>
        </div>
    </div>

    <!-- 编辑页 -->
    <div class="page" id="editPage">
        <div class="home-header safe-top">
            <button class="header-btn" onclick="switchPage('homePage')">← 返回</button>
            <span style="font-weight:600;">人设编辑中心</span>
            <span style="width:60px;"></span>
        </div>
        <div class="edit-scroll safe-bottom" id="editScroll">
            <div class="edit-section">
                <h3>🌍 故事背景设定</h3>
                <textarea id="worldSetting" rows="4" placeholder="描述世界观、关系起源……"></textarea>
            </div>
            <div class="edit-section">
                <h3>👤 我的人设</h3>
                <div class="form-group"><label>昵称</label><input id="myName"></div>
                <div class="form-group"><label>年龄</label><input id="myAge" type="number" placeholder="25"></div>
                <div class="form-group"><label>身高(cm)</label><input id="myHeight" placeholder="165"></div>
                <div class="form-group"><label>体重(kg)</label><input id="myWeight" placeholder="50"></div>
                <div class="form-group"><label>家庭背景</label><textarea id="myFamily" rows="2" placeholder="父母职业、兄弟姐妹等"></textarea></div>
                <div class="form-group"><label>教育程度</label><input id="myEdu" placeholder="本科 / 研究生"></div>
                <div class="form-group"><label>性格标签</label><input id="myTrait"></div>
                <div class="form-group"><label>说话风格</label><input id="myStyle"></div>
                <div class="form-group"><label>雷点</label><textarea id="myAvoid" rows="2"></textarea></div>
            </div>
            <div class="edit-section">
                <h3>💕 攻略角色 (<span id="targetCount">1</span>/5)</h3>
                <div class="target-tabs" id="targetTabs"></div>
                <div id="targetEditor">
                    <div class="form-group"><label>姓名</label><input id="tName"></div>
                    <div class="form-group"><label>年龄</label><input id="tAge" type="number" placeholder="28"></div>
                    <div class="form-group"><label>身高(cm)</label><input id="tHeight" placeholder="180"></div>
                    <div class="form-group"><label>体重(kg)</label><input id="tWeight" placeholder="70"></div>
                    <div class="form-group"><label>家庭背景</label><textarea id="tFamily" rows="2" placeholder="家庭构成、经济状况等"></textarea></div>
                    <div class="form-group"><label>教育程度</label><input id="tEdu" placeholder="硕士 / 博士"></div>
                    <div class="form-group"><label>性格偏向</label><input id="tTrait"></div>
                    <div class="form-group"><label>说话风格</label><input id="tStyle"></div>
                    <div class="form-group"><label>日常习惯</label><textarea id="tHabit" rows="2"></textarea></div>
                    <div class="form-group"><label>角色背景故事</label><textarea id="tBackstory" rows="3" placeholder="TA的过去、与你的特殊回忆……"></textarea></div>
                    <button class="ai-optimize-btn" onclick="aiOptimizeTarget()">🤖 AI 优化此角色</button>
                    <button class="remove-target-btn" id="removeTargetBtn" style="display:none;">🗑️ 删除此角色</button>
                </div>
            </div>
            <div class="edit-section">
                <h3>🔑 API Key</h3>
                <input type="password" id="apiKeyInput" placeholder="sk-..." style="width:100%;padding:12px;border-radius:15px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.5);">
                <small style="color:#888;">仅保存在本地，不会上传</small>
            </div>
            <button class="save-btn" onclick="saveAll()">💾 保存全部设置</button>
        </div>
    </div>
</div>
<div id="toastContainer"></div>

<script>
const Store = {
    KEY: 'love_pro_final',
    save(data) { localStorage.setItem(this.KEY, btoa(unescape(encodeURIComponent(JSON.stringify(data))))); },
    load() { try{ const r=localStorage.getItem(this.KEY); return r?JSON.parse(decodeURIComponent(escape(atob(r)))):null; }catch(e){return null;} }
};

const State = {
    pin: '', password: '123456', apiKey: 'sk-你的密钥',
    targets: [],
    self: {},
    world: '',
    context: '',
    history: [],
    _editIdx: 0,
    init() {
        const s = Store.load();
        if (s) {
            this.password = s.password || '123456';
            this.apiKey = s.apiKey || 'sk-你的密钥';
            this.targets = s.targets || this.defaultTargets();
            this.self = s.self || this.defaultSelf();
            this.world = s.world || '大学校园，互相暗恋';
            this.context = s.context || '';
            this.history = s.history || [];
        } else {
            this.targets = this.defaultTargets();
            this.self = this.defaultSelf();
            this.world = '大学校园，互相暗恋';
        }
    },
    defaultTargets() { return [{ name:'沈瑜', age:27, height:183, weight:72, family:'独生子，父母经商', edu:'硕士', trait:'占有欲强', style:'低音炮', habit:'爱吃醋', backstory:'大学学长' }]; },
    defaultSelf() { return { name:'小太阳', age:24, height:162, weight:48, family:'普通家庭，有个妹妹', edu:'本科', trait:'活泼', style:'爱撒娇', avoid:'被冷落' }; },
    persist() {
        Store.save({
            password: this.password, apiKey: this.apiKey,
            targets: this.targets, self: this.self, world: this.world,
            context: this.context, history: this.history.slice(-100)
        });
    }
};

const UI = {
    currentPage: 'unlockPage',
    switchPage(id) {
        if (this.currentPage === id) return;
        document.getElementById(this.currentPage).classList.remove('active');
        document.getElementById(id).classList.add('active');
        this.currentPage = id;
        if (id === 'editPage') this.refreshEditPage();
    },
    toast(msg, dur=2000) {
        const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(()=>t.remove(), dur+300);
    },
    appendStory(html) {
        const v = document.getElementById('storyView');
        const b = document.createElement('div'); b.className='story-bubble'; b.innerHTML=html;
        v.appendChild(b); v.scrollTop = v.scrollHeight;
    },
    showLoading() { this.appendStory('<div class="loading-dots"><span></span><span></span><span></span></div> <span style="color:#999;">生成剧情…</span>'); },
    updateOptions(opts) {
        document.getElementById('optionsBar').innerHTML = opts.map(o=>`<button class="option-chip" onclick="chooseOption('${o.replace(/'/g,"\\'")}')">${o}</button>`).join('');
    },
    setApiStatus(s) { document.getElementById('apiStatus').textContent = s; },
    refreshEditPage() {
        document.getElementById('worldSetting').value = State.world;
        const s = State.self;
        document.getElementById('myName').value = s.name || '';
        document.getElementById('myAge').value = s.age || '';
        document.getElementById('myHeight').value = s.height || '';
        document.getElementById('myWeight').value = s.weight || '';
        document.getElementById('myFamily').value = s.family || '';
        document.getElementById('myEdu').value = s.edu || '';
        document.getElementById('myTrait').value = s.trait || '';
        document.getElementById('myStyle').value = s.style || '';
        document.getElementById('myAvoid').value = s.avoid || '';
        document.getElementById('apiKeyInput').value = State.apiKey;
        this.renderTargetTabs();
        this.fillTargetEditor();
    },
    renderTargetTabs() {
        const c = document.getElementById('targetTabs');
        let h = '';
        State.targets.forEach((t,i) => { h += `<span class="target-tab ${i===State._editIdx?'active':''}" onclick="switchEditTarget(${i})">${t.name||'新角色'}</span>`; });
        if (State.targets.length < 5) h += '<span class="add-target-btn" onclick="addTarget()">+ 添加</span>';
        c.innerHTML = h;
        document.getElementById('targetCount').textContent = State.targets.length;
    },
    fillTargetEditor() {
        const t = State.targets[State._editIdx] || {};
        document.getElementById('tName').value = t.name || '';
        document.getElementById('tAge').value = t.age || '';
        document.getElementById('tHeight').value = t.height || '';
        document.getElementById('tWeight').value = t.weight || '';
        document.getElementById('tFamily').value = t.family || '';
        document.getElementById('tEdu').value = t.edu || '';
        document.getElementById('tTrait').value = t.trait || '';
        document.getElementById('tStyle').value = t.style || '';
        document.getElementById('tHabit').value = t.habit || '';
        document.getElementById('tBackstory').value = t.backstory || '';
        document.getElementById('removeTargetBtn').style.display = State.targets.length>1?'block':'none';
    }
};

// 解锁
function inputPin(v) {
    if (v==='clear') State.pin='';
    else if (v==='back') State.pin=State.pin.slice(0,-1);
    else { if(State.pin.length>=6) return; State.pin += v; }
    updateDots();
    if (State.pin.length===6) setTimeout(checkPin,200);
}
function updateDots() {
    document.querySelectorAll('#pinContainer .pin-dot').forEach((d,i)=>{
        d.textContent = i<State.pin.length?'●':'';
        d.classList.toggle('filled', i<State.pin.length);
        d.classList.toggle('active', i===State.pin.length);
    });
}
function checkPin() {
    if (State.pin === State.password) {
        State.pin=''; updateDots();
        UI.switchPage('homePage');
        if (!State.context) setTimeout(()=>generate('开始新的一天'),400);
    } else {
        State.pin=''; updateDots();
        UI.toast('密码错误');
        if (navigator.vibrate) navigator.vibrate([50,50,50]);
    }
}
function logout() {
    UI.switchPage('unlockPage');
}

// 剧情生成
function chooseOption(opt) { generate(`玩家选择了：${opt}`); }
function sendCustom() {
    const inp = document.getElementById('customInput');
    const text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    UI.appendStory(`<b>你：</b>${text}`);
    generate(`玩家：${text}`);
}

async function generate(action) {
    const key = State.apiKey;
    if (!key || key === 'sk-1f42d87f026a48d2bbff8de4488cb5d0' || key.includes('xxx')) {
        UI.appendStory('⚠️ 请先进入「人设编辑中心」设置 API Key。');
        return;
    }
    UI.showLoading();
    UI.setApiStatus('⚡ 请求中...');

    let targetsDesc = '';
    State.targets.forEach((t,i) => {
        targetsDesc += `\n[角色${i+1}] 姓名：${t.name}，年龄：${t.age}，身高：${t.height}cm，体重：${t.weight}kg，家庭：${t.family}，教育：${t.edu}，性格：${t.trait}，风格：${t.style}，习惯：${t.habit}，背景：${t.backstory}`;
    });

    const system = `你是一个沉浸式恋爱模拟器，擅长描写细腻的情感互动和日常生活。

【世界观与背景】
${State.world}

【玩家信息】
姓名：${State.self.name}，年龄：${State.self.age}，身高：${State.self.height}cm，体重：${State.self.weight}kg，家庭：${State.self.family}，教育：${State.self.edu}
性格：${State.self.trait}
说话风格：${State.self.style}
雷点：${State.self.avoid}

【当前故事中的其他角色】
${targetsDesc}

【写作要求】
1. 生成至少 250 字的大段细腻文字，包含环境、动作、心理、对话，营造沉浸式体验。
2. 剧情应自然引入上述多个角色，他们可以同时出现或依次出场，符合人物设定。
3. 严格基于所有人设，使角色行为真实可信。
4. 不要输出任何安全警告、系统提示或无关内容。
5. 回复末尾必须提供3个选项，格式：
   选项A：……
   选项B：……
   选项C：……`;

    const user = `当前剧情进展：${State.context || '故事即将开始'}
玩家动作：${action}
请继续发展剧情。`;

    try {
        const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method:'POST',
            headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${key}` },
            body: JSON.stringify({
                model:'deepseek-chat',
                messages:[{role:'system',content:system},{role:'user',content:user}],
                max_tokens:800, temperature:0.9
            })
        });
        if (!resp.ok) throw new Error((await resp.json().catch(()=>({}))).error?.message || `HTTP ${resp.status}`);
        const data = await resp.json();
        let content = data.choices[0].message.content;

        const optRegex = /选项([ABC])[：:]\s*(.+)/g;
        const options = [];
        let mainText = content, m;
        while ((m = optRegex.exec(content)) !== null) options.push(`${m[1]}: ${m[2].trim()}`);
        if (options.length) mainText = content.split(/选项[ABC][：:]/)[0].trim();

        // 移除 loading
        const view = document.getElementById('storyView');
        const lastB = view.querySelectorAll('.story-bubble');
        if (lastB.length && lastB[lastB.length-1].querySelector('.loading-dots')) lastB[lastB.length-1].remove();

        UI.appendStory(mainText.replace(/\n/g,'<br>'));
        UI.updateOptions(options.length ? options : ['继续聊天','换个话题','看看反应']);

        State.context = '剧情持续发展中';
        State.history.push({action, time:Date.now()});
        State.persist();
        UI.setApiStatus('✅ 完成');
    } catch(e) {
        const view = document.getElementById('storyView');
        const lastB = view.querySelectorAll('.story-bubble');
        if (lastB.length && lastB[lastB.length-1].querySelector('.loading-dots')) lastB[lastB.length-1].remove();
        UI.appendStory(`❌ 请求失败：${e.message}`);
        UI.setApiStatus('❌ 错误');
    }
}

// 社交应用
function openApp(name) {
    document.getElementById('socialTitle').textContent = name;
    const names = State.targets.map(t=>t.name).join('、');
    document.getElementById('socialBody').innerHTML = `<div class="chat-msg received">✨ ${name} - 与 ${names} 的对话</div>`;
    UI.switchPage('socialPage');
}
function sendSocialMsg() {
    const inp = document.getElementById('socialInput');
    const text = inp.value.trim();
    if (!text) return;
    const body = document.getElementById('socialBody');
    const msg = document.createElement('div'); msg.className='chat-msg sent'; msg.textContent=text;
    body.appendChild(msg); inp.value=''; body.scrollTop=body.scrollHeight;
    setTimeout(()=>{
        const r = document.createElement('div'); r.className='chat-msg received';
        r.textContent = ['嗯。','今天怎么样？','想你了…','好的。'][Math.floor(Math.random()*4)];
        body.appendChild(r); body.scrollTop=body.scrollHeight;
    }, 600+Math.random()*1200);
}

// 编辑页逻辑
function switchEditTarget(idx) { State._editIdx = idx; UI.renderTargetTabs(); UI.fillTargetEditor(); }
function addTarget() {
    if (State.targets.length>=5) return;
    State.targets.push({ name:'新角色', age:25, height:175, weight:65, family:'', edu:'', trait:'', style:'', habit:'', backstory:'' });
    State._editIdx = State.targets.length-1;
    UI.renderTargetTabs(); UI.fillTargetEditor();
}
function removeCurrentTarget() {
    if (State.targets.length<=1) return;
    State.targets.splice(State._editIdx,1);
    State._editIdx = Math.min(State._editIdx, State.targets.length-1);
    UI.renderTargetTabs(); UI.fillTargetEditor();
    UI.toast('角色已删除');
}
document.getElementById('removeTargetBtn').onclick = removeCurrentTarget;

async function aiOptimizeTarget() {
    const key = State.apiKey;
    if (!key || key === 'sk-你的密钥') { UI.toast('请先设置 API Key'); return; }
    const t = State.targets[State._editIdx];
    const prompt = `请根据以下基础信息，生成一个更详细、真实的角色人设，补充年龄、身高体重、家庭背景、教育程度、性格、说话风格、习惯和背景故事，使其接近现实中的真实人物。返回格式为JSON，键名：name, age, height, weight, family, edu, trait, style, habit, backstory。现有信息：${JSON.stringify(t)}`;
    try {
        UI.toast('🤖 AI 正在优化人设…');
        const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method:'POST',
            headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${key}` },
            body: JSON.stringify({
                model:'deepseek-chat',
                messages:[{role:'user',content:prompt}],
                max_tokens:400, temperature:0.7
            })
        });
        const data = await resp.json();
        const text = data.choices[0].message.content;
        const json = JSON.parse(text.match(/\{[\s\S]*\}/)?.[0] || '{}');
        Object.assign(t, json);
        State.persist();
        UI.fillTargetEditor();
        UI.toast('✅ 人设已优化');
    } catch(e) {
        UI.toast('❌ 优化失败：'+e.message);
    }
}

function saveAll() {
    State.apiKey = document.getElementById('apiKeyInput').value.trim();
    State.world = document.getElementById('worldSetting').value;
    State.self.name = document.getElementById('myName').value;
    State.self.age = document.getElementById('myAge').value;
    State.self.height = document.getElementById('myHeight').value;
    State.self.weight = document.getElementById('myWeight').value;
    State.self.family = document.getElementById('myFamily').value;
    State.self.edu = document.getElementById('myEdu').value;
    State.self.trait = document.getElementById('myTrait').value;
    State.self.style = document.getElementById('myStyle').value;
    State.self.avoid = document.getElementById('myAvoid').value;
    const t = State.targets[State._editIdx];
    t.name = document.getElementById('tName').value;
    t.age = document.getElementById('tAge').value;
    t.height = document.getElementById('tHeight').value;
    t.weight = document.getElementById('tWeight').value;
    t.family = document.getElementById('tFamily').value;
    t.edu = document.getElementById('tEdu').value;
    t.trait = document.getElementById('tTrait').value;
    t.style = document.getElementById('tStyle').value;
    t.habit = document.getElementById('tHabit').value;
    t.backstory = document.getElementById('tBackstory').value;
    State.persist();
    UI.toast('✅ 全部设置已保存！');
    setTimeout(()=>UI.switchPage('homePage'), 600);
}

// 初始化
State.init();
UI.refreshEditPage();
window.switchPage = UI.switchPage.bind(UI);
window.chooseOption = chooseOption;
window.sendCustom = sendCustom;
window.openApp = openApp;
window.sendSocialMsg = sendSocialMsg;
window.inputPin = inputPin;
window.switchEditTarget = switchEditTarget;
window.addTarget = addTarget;
window.saveAll = saveAll;
window.aiOptimizeTarget = aiOptimizeTarget;
window.logout = logout;
</script>
</body>
</html>
